<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Oracle PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        :root { --bg-deep: #0a0118; --neon-magenta: #ff00ff; --neon-cyan: #00f2ff; --neon-green: #00ff9f; --neon-purple: #bc13fe; --neon-yellow: #ffea00; }
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; }
        .app-shell { width: 100%; max-width: 450px; height: 100vh; margin: auto; background: var(--bg-deep); position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .main-container { position: relative; z-index: 10; height: calc(100vh - 80px); overflow-y: auto; padding: 20px; }
        .page-section { display: none; }
        .page-section.active { display: block; }
        .cyber-card { background: rgba(255, 255, 255, 0.03); border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(5px); }
        .match-row { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .match-info b { font-size: 13px; display: block; }
        .match-info span { font-size: 9px; color: var(--neon-cyan); }
        .prob-badge { border: 1px solid var(--neon-green); color: var(--neon-green); padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 900; }
        
        /* DETAIL PANEL */
        #detail-view { position: absolute; inset: 0; background: #060112; z-index: 10000; display: none; padding: 20px; transform: translateY(100%); transition: 0.4s; overflow-y: auto; }
        #detail-view.open { display: block; transform: translateY(0); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stat-square { background: rgba(255,255,255,0.03); height: 80px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.08); }
        .stat-square span { font-size: 8px; opacity: 0.6; text-transform: uppercase; }
        .stat-square b { font-size: 20px; }
        
        nav { position: absolute; bottom: 0; width: 100%; height: 80px; background: rgba(10, 10, 20, 0.98); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-link { color: rgba(255,255,255,0.3); font-size: 10px; text-align: center; cursor: pointer; }
        .nav-link.active { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
        .nav-link i { display: block; font-size: 18px; margin-bottom: 5px; font-style: normal; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="main-container">
        <!-- ZÁPASY -->
        <section id="sect-matches" class="page-section active">
            <h2 style="font-size: 11px; color: var(--neon-magenta); letter-spacing: 2px;">// NEURAL_FEED</h2>
            <div id="match-list-container"></div>
        </section>

        <!-- TIKET (Tvoj automatický výber) -->
        <section id="sect-ticket" class="page-section">
            <h2 style="font-size: 11px; color: var(--neon-cyan); letter-spacing: 2px;">// AI_STRATEGY</h2>
            <div class="cyber-card" style="border-left: 3px solid var(--neon-yellow);">
                <div style="font-size: 9px; color: var(--neon-yellow);">SOLO_STRIKE</div>
                <div id="ticket-solo-name" style="font-size: 15px; font-weight: 900; margin: 10px 0;">...</div>
                <div style="display:flex; justify-content:space-between; font-size:11px;">
                    <span>TIP: Over 1.5</span> <b id="ticket-solo-prob" style="color:var(--neon-green)">0%</b>
                </div>
            </div>
            <div class="cyber-card" style="border-left: 3px solid var(--neon-purple); margin-top: 15px;">
                <div style="font-size: 9px; color: var(--neon-purple);">KOMBO_ACCUMULATOR</div>
                <div id="ticket-kombo-list" style="font-size: 12px; margin-top: 10px; line-height: 1.6; font-family: 'JetBrains Mono';">...</div>
            </div>
        </section>

        <!-- OSTATNÉ -->
        <section id="sect-stats" class="page-section">
            <h2 style="font-size: 11px; color: var(--neon-green); letter-spacing: 2px;">// PERFORMANCE</h2>
            <div class="cyber-card" style="text-align: center; padding: 40px;">
                <span style="font-size: 10px; opacity: 0.5;">WIN_RATE_WEEKLY</span>
                <div style="font-size: 40px; color: var(--neon-green); font-weight: 900;">84.7%</div>
            </div>
        </section>
    </div>

    <!-- DETAIL -->
    <div id="detail-view">
        <div onclick="closeMatch()" style="color:var(--neon-magenta); font-size:10px; margin-bottom:20px; cursor:pointer;">[ BACK ]</div>
        <h2 id="det-title" style="text-align:center; font-size:16px;"></h2>
        <div class="stat-grid">
            <div class="stat-square"><span>OVER 1.5</span><b id="s1" style="color:var(--neon-yellow)">-</b></div>
            <div class="stat-square"><span>OVER 2.5</span><b id="s2" style="color:var(--neon-magenta)">-</b></div>
            <div class="stat-square"><span>BTTS</span><b id="s3" style="color:var(--neon-green)">-</b></div>
            <div class="stat-square"><span>CORNERS</span><b id="s5" style="color:var(--neon-cyan)">-</b></div>
        </div>
        <div class="cyber-card" id="det-gpt" style="font-size: 11px; font-family: 'JetBrains Mono'; color: #ccc;"></div>
    </div>

    <nav>
        <div class="nav-link active" onclick="showPage('sect-matches', this)"><i>⚽</i>FEED</div>
        <div class="nav-link" onclick="showPage('sect-ticket', this)"><i>🎫</i>TIKET</div>
        <div class="nav-link" onclick="showPage('sect-stats', this)"><i>📊</i>STATS</div>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBX-qBKbLfmBynXr4Bf1q5j4cXFyU9Dv0M",
        authDomain: "patoanalitik.firebaseapp.com",
        projectId: "patoanalitik",
        storageBucket: "patoanalitik.firebasestorage.app",
        messagingSenderId: "585647962898",
        appId: "1:585647962898:web:d050a3983c3e473e49d1cb"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function getToday() { return new Date().toISOString().slice(0, 10).replace(/-/g, ''); }

    function loadLiveFeed() {
        const dnes = getToday();
        const container = document.getElementById('match-list-container');

        // Načítanie zápasov
        db.collection("zapasy").where("timestamp", "==", dnes).get().then(snap => {
            container.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const div = document.createElement('div');
                div.className = "cyber-card match-row";
                div.onclick = () => openMatch(m);
                div.innerHTML = `<div><b>${m.zapas}</b><span>${m.cas}</span></div><div class="prob-badge">${m.o15}%</div>`;
                container.appendChild(div);
            });
        });

        // Načítanie automatického tiketu
        db.collection("denne_tikety").document(dnes).get().then(doc => {
            if (doc.exists) {
                const d = doc.data();
                document.getElementById('ticket-solo-name').innerText = d.solo_match;
                document.getElementById('ticket-solo-prob').innerText = d.solo_prob;
                document.getElementById('ticket-kombo-list').innerHTML = d.kombo;
            }
        });
    }

    function openMatch(m) {
        document.getElementById('det-title').innerText = m.zapas;
        document.getElementById('s1').innerText = m.o15 + "%";
        document.getElementById('s2').innerText = m.o25 + "%";
        document.getElementById('s3').innerText = m.btts + "%";
        document.getElementById('s5').innerText = m.rohy;
        document.getElementById('det-gpt').innerText = m.ai;
        const view = document.getElementById('detail-view');
        view.style.display = 'block';
        setTimeout(() => view.classList.add('open'), 10);
    }

    function closeMatch() { 
        const view = document.getElementById('detail-view');
        view.classList.remove('open');
        setTimeout(() => view.style.display = 'none', 400);
    }

    function showPage(id, el) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    loadLiveFeed();
</script>
</body>
</html>
