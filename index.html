<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PatoAnalitik PRO</title>
    
    <!-- Meta tagy pre pocit skutočnej apky -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050510">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg: #050510;
            --card-bg: #11111d;
            --accent: #00f2ff;
            --fuchsia: #ff00ff;
            --green: #00ff88;
            --text-main: #ffffff;
            --text-dim: #888899;
            --nav-bg: #0a0a15;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            padding-bottom: 80px; /* Priestor pre spodné menu */
        }

        /* Status bar padding pre iPhony */
        header {
            padding: 50px 20px 15px;
            background: linear-gradient(to bottom, #101025, var(--bg));
            position: sticky;
            top: 0;
            z-index: 100;
            text-align: left;
        }

        header h1 { font-size: 24px; margin: 0; font-weight: 800; letter-spacing: -0.5px; }
        header span { color: var(--accent); }
        header p { margin: 5px 0 0; color: var(--text-dim); font-size: 14px; }

        /* Zoznam zápasov */
        .container { padding: 15px; }

        .match-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .match-card:active { transform: scale(0.97); }

        .league { font-size: 11px; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 8px; letter-spacing: 1px; }
        .teams { font-size: 17px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
        .teams span { color: var(--text-dim); font-size: 14px; font-weight: 400; }

        /* Detail obrazovka */
        #detail-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 200;
            display: none;
            overflow-y: auto;
            padding: 60px 20px 20px;
        }

        .back-btn { position: absolute; top: 40px; left: 20px; font-size: 28px; color: var(--accent); cursor: pointer; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 25px 0; }
        .stat-box { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #222; }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .stat-val { font-size: 20px; font-weight: 700; color: var(--accent); }

        .ai-card { background: rgba(0, 255, 136, 0.05); border: 1px solid var(--green); border-radius: 16px; padding: 20px; margin-top: 10px; }
        .ai-card h3 { margin: 0 0 10px; color: var(--green); font-size: 16px; }
        .ai-card p { margin: 0; font-style: italic; line-height: 1.5; color: #ccc; font-size: 14px; }

        /* Spodná navigácia */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 70px;
            background: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
            padding-bottom: 10px;
            z-index: 150;
        }
        .nav-item { text-align: center; color: var(--text-dim); font-size: 10px; text-decoration: none; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }

    </style>
</head>
<body>

    <div id="main-screen">
        <header>
            <h1>Pato<span>Analitik</span> PRO</h1>
            <p>Dnešné top analýzy</p>
        </header>

        <div class="container" id="matches-list">
            <p style="text-align: center; color: var(--text-dim);">Načítavam analýzy...</p>
        </div>
    </div>

    <div id="detail-screen">
        <div class="back-btn" onclick="closeDetail()">✕</div>
        <h2 id="det-teams" style="text-align: center; margin-top: 20px;"></h2>
        <div id="det-content"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><span class="nav-icon">⚽</span>Zápasy</div>
        <div class="nav-item"><span class="nav-icon">📊</span>Tikety</div>
        <div class="nav-item"><span class="nav-icon">👤</span>Profil</div>
    </nav>

<script>
    // TVOJA KONFIGURÁCIA FIREBASE (Ponechaj ako máš)
    const firebaseConfig = {
        apiKey: "AIzaSyBX-qBKbLfmBynXr4Bf1q5j4cXFyU9Dv0M",
        authDomain: "patoanalitik.firebaseapp.com",
        projectId: "patoanalitik",
        storageBucket: "patoanalitik.firebasestorage.app",
        messagingSenderId: "585647962898",
        appId: "1:585647962898:web:d050a3983c3e473e49d1cb"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const currentDay = "20260330"; 

    function loadMatches() {
        const listDiv = document.getElementById('matches-list');
        db.collection("zapasy").where("timestamp", "==", currentDay).get().then(snap => {
            listDiv.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const card = document.createElement('div');
                card.className = 'match-card';
                card.onclick = () => openDetail(m);
                card.innerHTML = `
                    <div class="league">${m.liga || 'Svet'}</div>
                    <div class="teams">${m.zapas.split(' vs ')[0]} <span>vs</span> ${m.zapas.split(' vs ')[1]}</div>
                `;
                listDiv.appendChild(card);
            });
        });
    }

    function openDetail(m) {
        document.getElementById('detail-screen').style.display = 'block';
        document.getElementById('det-teams').innerText = m.zapas;
        document.getElementById('det-content').innerHTML = `
            <div class="stat-grid">
                <div class="stat-box"><div class="stat-label">Over 1.5</div><div class="stat-val">${m.o15}%</div></div>
                <div class="stat-box"><div class="stat-label">Over 2.5</div><div class="stat-val">${m.o25}%</div></div>
                <div class="stat-box"><div class="stat-label">BTTS</div><div class="stat-val">${m.btts > 50 ? 'ÁNO' : 'NIE'}</div></div>
                <div class="stat-box"><div class="stat-label">Rohy</div><div class="stat-val">${m.rohy}</div></div>
            </div>
            <div class="ai-card">
                <h3>💡 AI Analýza</h3>
                <p>${m.ai}</p>
            </div>
        `;
    }

    function closeDetail() {
        document.getElementById('detail-screen').style.display = 'none';
    }

    loadMatches();
</script>
</body>
</html>
