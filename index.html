<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Tickets PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-dark: #050505;
            --neon-purple: #bc13fe;
            --neon-cyan: #00f2ff;
            --neon-yellow: #fefe33;
            --neon-green: #00ff41;
            --neon-orange: #ff8c00;
            --text-gray: #aaaaaa;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: white;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .app-header { text-align: center; padding: 45px 20px 10px; font-size: 16px; font-weight: 600; color: var(--text-gray); text-transform: uppercase; letter-spacing: 2px; }
        .section-title { padding: 10px 25px; font-size: 26px; font-weight: 800; margin-bottom: 15px; }

        .matches-container { padding: 0 18px 100px; }

        .match-card {
            background: rgba(15, 15, 25, 0.95);
            border-radius: 22px;
            margin-bottom: 18px;
            padding: 20px;
            border: 2px solid transparent;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.2s;
        }
        .match-card:active { transform: scale(0.96); }

        /* Neónové farby */
        .card-purple { border-color: var(--neon-purple); box-shadow: 0 0 15px rgba(188, 19, 254, 0.3); }
        .card-cyan { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }

        .league-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.07);
            width: fit-content;
            padding: 5px 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .flag-icon { font-size: 14px; }
        .league-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .teams-display {
            font-size: 21px;
            font-weight: 700;
            text-align: center;
            line-height: 1.3;
        }
        .teams-display span { color: var(--text-gray); font-weight: 300; font-size: 16px; margin: 0 8px; }

        /* Detail */
        #detail-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            z-index: 2000;
            display: none;
            overflow-y: auto;
            padding: 60px 20px;
        }

        .close-btn { position: absolute; top: 45px; left: 25px; font-size: 26px; color: var(--neon-cyan); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 25px; }
        .stat-card { background: rgba(255,255,255,0.03); border: 2px solid #222; border-radius: 18px; padding: 20px; text-align: center; }
        .stat-card.active-yellow { border-color: var(--neon-yellow); box-shadow: 0 0 12px rgba(254, 254, 51, 0.2); }
        .stat-card.active-purple { border-color: var(--neon-purple); box-shadow: 0 0 12px rgba(188, 19, 254, 0.2); }
        .stat-card.active-cyan { border-color: var(--neon-cyan); box-shadow: 0 0 12px rgba(0, 242, 255, 0.2); }
        .stat-card.full-width { grid-column: 1 / -1; border-color: var(--neon-orange); }

        .s-label { font-size: 11px; color: var(--text-gray); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px; }
        .s-value { font-size: 24px; font-weight: 800; }

        .ai-analysis-card {
            margin-top: 20px;
            border: 1px solid var(--neon-green);
            background: rgba(0, 255, 65, 0.03);
            padding: 20px;
            border-radius: 20px;
        }
        .ai-analysis-card h3 { color: var(--neon-green); margin: 0 0 10px; font-size: 15px; text-transform: uppercase; }
        .ai-analysis-card p { font-size: 14px; color: #bbb; line-height: 1.6; font-style: italic; }

    </style>
</head>
<body>

    <div id="list-view">
        <div class="app-header">Neural Tickets</div>
        <div class="section-title">Dnešné Tipy</div>
        <div class="matches-container" id="matches-list"></div>
    </div>

    <div id="detail-screen">
        <div class="close-btn" onclick="closeDetail()">❮</div>
        <div class="app-header">Neural Tickets</div>
        <h2 id="det-teams-title" style="text-align:center; margin: 30px 0; font-size:26px;"></h2>
        <div class="stats-grid" id="det-stats-grid"></div>
        <div id="det-ai-box" class="ai-analysis-card"></div>
    </div>

<script>
    // TVOJ FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyBX-qBKbLfmBynXr4Bf1q5j4cXFyU9Dv0M",
        authDomain: "patoanalitik.firebaseapp.com",
        projectId: "patoanalitik",
        storageBucket: "patoanalitik.firebasestorage.app",
        messagingSenderId: "585647962898",
        appId: "1:585647962898:web:d050a3983c3e473e49d1cb"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const currentDay = "20260330"; 

    // Funkcia na priradenie vlajky podľa názvu ligy
    function getFlag(liga) {
        if (!liga) return "⚽";
        const l = liga.toLowerCase();
        if (l.includes("premier")) return "🏴󠁧󠁢󠁥󠁮󠁧󠁿";
        if (l.includes("serie")) return "🇮🇹";
        if (l.includes("laliga")) return "🇪🇸";
        if (l.includes("bundesliga")) return "🇩🇪";
        if (l.includes("fortuna") || l.includes("slovak")) return "🇸🇰";
        return "⚽"; // Neutrálna lopta ak nepozná ligu
    }

    function loadMatches() {
        const list = document.getElementById('matches-list');
        db.collection("zapasy").where("timestamp", "==", currentDay).get().then(snap => {
            list.innerHTML = "";
            snap.forEach((doc, i) => {
                const m = doc.data();
                const neonClass = i % 2 === 0 ? 'card-purple' : 'card-cyan';
                
                const card = document.createElement('div');
                card.className = `match-card ${neonClass}`;
                card.onclick = () => openDetail(m);
                card.innerHTML = `
                    <div class="league-badge">
                        <span class="flag-icon">${getFlag(m.liga)}</span>
                        <span class="league-name">${m.liga || 'LIGA'}</span>
                    </div>
                    <div class="teams-display">
                        ${m.zapas.replace(' vs ', ' <span>vs</span> ')}
                    </div>
                `;
                list.appendChild(card);
            });
        });
    }

    function openDetail(m) {
        document.getElementById('detail-screen').style.display = 'block';
        document.getElementById('det-teams-title').innerHTML = m.zapas.replace(' vs ', '<br><span style="color:#555; font-size:16px;">vs</span><br>');
        
        document.getElementById('det-stats-grid').innerHTML = `
            <div class="stat-card active-yellow"><div class="s-label">Over 1.5</div><div class="s-value" style="color:var(--neon-yellow)">${m.o15}%</div></div>
            <div class="stat-card active-purple"><div class="s-label">Over 2.5</div><div class="s-value" style="color:var(--neon-purple)">${m.o25}%</div></div>
            <div class="stat-card active-purple"><div class="s-label">BTTS</div><div class="s-value" style="color:var(--neon-purple)">${m.btts > 50 ? 'YES' : 'NO'}</div></div>
            <div class="stat-card active-cyan"><div class="s-label">Corners</div><div class="s-value" style="color:var(--neon-cyan)">${m.rohy}</div></div>
            <div class="stat-card full-width"><div class="s-label">Cards</div><div class="s-value" style="color:var(--neon-orange)">${m.karty}</div></div>
        `;

        document.getElementById('det-ai-box').innerHTML = `
            <h3>AI Analysis</h3>
            <p>${m.ai || 'Načítavam analýzu...'}</p>
        `;
    }

    function closeDetail() {
        document.getElementById('detail-screen').style.display = 'none';
    }

    loadMatches();
</script>
</body>
</html>
