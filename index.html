<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatoAnalitik PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #050510;
            --card-bg: #101020;
            --text: #ffffff;
            --neon-fuchsia: #ff00ff;
            --neon-cyan: #00f2ff;
            --neon-yellow: #ffff00;
            --neon-purple: #b000ff;
            --neon-green: #00ff88;
            --neon-orange: #ff8800;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Hlavný kontajner imitujúci plochu */
        .desktop-emulation {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Štýl mobilného telefónu */
        .phone-frame {
            background: #000;
            width: 360px;
            height: 740px;
            border: 12px solid #222;
            border-radius: 40px;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            scrollbar-width: none; /* Pre Firefox */
        }
        .phone-frame::-webkit-scrollbar { display: none; } /* Pre Chrome/Safari */

        /* Horná lišta telefónu (Notch) */
        .phone-notch {
            background: #222;
            height: 25px;
            width: 150px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 10;
        }

        header {
            padding: 40px 20px 10px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        header h1 { font-size: 20px; margin: 0; color: #fff; }
        header h2 { font-size: 16px; margin: 5px 0 0; color: #aaa; }

        /* Zoznam zápasov */
        .matches-list { padding: 15px; }
        .match-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            border: 2px solid transparent;
        }

        /* Neónové okraje pre karty */
        .match-card.fuchsia { border-color: var(--neon-fuchsia); box-shadow: 0 0 15px var(--neon-fuchsia); }
        .match-card.cyan { border-color: var(--neon-cyan); box-shadow: 0 0 15px var(--neon-cyan); }

        .match-card:hover { transform: scale(1.03); }

        .league-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            text-transform: uppercase;
            color: #eee;
        }
        .match-teams { font-size: 16px; font-weight: bold; margin-top: 20px; text-align: center; }
        .match-teams span { color: #888; font-weight: normal; margin: 0 5px; }

        /* DETAIL ZÁPASU - Presne podľa obrázka */
        #detail-screen {
            display: none; /* Skrytý na začiatku */
        }

        .detail-header {
            padding: 40px 20px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
        }
        .back-btn { font-size: 24px; cursor: pointer; color: #fff; }
        .detail-header h1 { font-size: 18px; margin: 0; flex: 1; text-align: center; }

        .detail-content { padding: 20px; }
        .detail-title { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 25px; }
        .detail-title span { color: #888; font-weight: normal; }

        /* Mriežka štatistík */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border: 2px solid transparent;
            position: relative;
        }

        .stat-card .stat-label { font-size: 12px; color: #aaa; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card .stat-value { font-size: 24px; font-weight: bold; }

        /* Farebné neónové okraje pre štatistiky */
        .stat-card.yellow { border-color: var(--neon-yellow); box-shadow: 0 0 10px var(--neon-yellow); }
        .stat-card.yellow .stat-value { color: var(--neon-yellow); }

        .stat-card.purple { border-color: var(--neon-purple); box-shadow: 0 0 10px var(--neon-purple); }
        .stat-card.purple .stat-value { color: var(--neon-purple); }

        .stat-card.cyan { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }
        .stat-card.cyan .stat-value { color: var(--neon-cyan); }

        .stat-card.orange { border-color: var(--neon-orange); box-shadow: 0 0 10px var(--neon-orange); grid-column: 1 / -1; } /* Na celú šírku */
        .stat-card.orange .stat-value { color: var(--neon-orange); }

        /* AI Analýza box */
        .ai-analysis-box {
            background: rgba(0, 255, 136, 0.05);
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }
        .ai-analysis-box h3 { color: var(--neon-green); margin: 0 0 10px; font-size: 16px; text-transform: uppercase; }
        .ai-analysis-box p { color: #ddd; font-size: 14px; line-height: 1.5; margin: 0; font-style: italic; }

    </style>
</head>
<body>

<div class="desktop-emulation">
    
    <div class="phone-frame" id="list-phone">
        <div class="phone-notch"></div>
        <header>
            <h1>PatoAnalitik ⚽</h1>
            <h2>Dnešné Tipy</h2>
        </header>
        <div class="matches-list" id="matches-container">
            </div>
    </div>

    <div class="phone-frame" id="detail-phone" style="display: none;">
        <div class="phone-notch"></div>
        <div id="detail-screen">
            <div class="detail-header">
                <div class="back-btn" onclick="closeDetail()">←</div>
                <h1>PatoAnalitik</h1>
                <div style="width:24px;"></div> </div>
            <div class="detail-content" id="detail-content-area">
                </div>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBX-qBKbLfmBynXr4Bf1q5j4cXFyU9Dv0M",
        authDomain: "patoanalitik.firebaseapp.com",
        projectId: "patoanalitik",
        storageBucket: "patoanalitik.firebasestorage.app",
        messagingSenderId: "585647962898",
        appId: "1:585647962898:web:d050a3983c3e473e49d1cb"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // Fixnutý dátum pre testovanie (ako na obrázku)
    let currentDay = "20260330"; 

    function loadMatches() {
        const container = document.getElementById('matches-container');
        container.innerHTML = "<p style='text-align:center; padding:20px; color:#888;'>Načítavam...</p>";

        db.collection("zapasy").where("timestamp", "==", currentDay).get().then(snap => {
            container.innerHTML = "";
            if(snap.empty) { container.innerHTML = "<p style='text-align:center; padding:20px; color:#666;'>Žiadne tipy.</p>"; return; }

            let counter = 0;
            snap.forEach(doc => {
                let m = doc.data();
                // Striedanie farieb okrajov (fuchsia / cyan)
                let neonClass = counter % 2 === 0 ? 'fuchsia' : 'cyan';
                
                let card = document.createElement('div');
                card.className = `match-card ${neonClass}`;
                card.onclick = () => openDetail(m);
                card.innerHTML = `
                    <div class="league-badge">${m.liga || 'Liga'}</div>
                    <div class="match-teams">${m.zapas.replace(' vs ', ' <span>vs</span> ')}</div>
                `;
                container.appendChild(card);
                counter++;
            });
        });
    }

    function openDetail(m) {
        // Skryť zoznam, zobraziť detail
        document.getElementById('list-phone').style.display = 'none';
        document.getElementById('detail-phone').style.display = 'block';
        document.getElementById('detail-screen').style.display = 'block';

        const contentArea = document.getElementById('detail-content-area');
        
        contentArea.innerHTML = `
            <div class="detail-title">${m.zapas.replace(' vs ', ' <span>vs</span> ')}</div>
            
            <div class="stats-grid">
                <div class="stat-card yellow">
                    <div class="stat-label">Over 1.5</div>
                    <div class="stat-value">${m.o15}%</div>
                </div>
                <div class="stat-card purple">
                    <div class="stat-label">Over 2.5</div>
                    <div class="stat-value">${m.o25}%</div>
                </div>
                <div class="stat-card purple">
                    <div class="stat-label">BTTS</div>
                    <div class="stat-value">${m.btts > 50 ? 'YES' : 'NO'}</div>
                </div>
                <div class="stat-card cyan">
                    <div class="stat-label">Corners</div>
                    <div class="stat-value">${m.rohy}</div>
                </div>
                <div class="stat-card orange">
                    <div class="stat-label">Cards</div>
                    <div class="stat-value">${m.karty}</div>
                </div>
            </div>

            <div class="ai-analysis-box">
                <h3>AI analýza</h3>
                <p>${m.ai}</p>
            </div>
        `;
    }

    function closeDetail() {
        // Skryť detail, zobraziť zoznam
        document.getElementById('detail-phone').style.display = 'none';
        document.getElementById('detail-screen').style.display = 'none';
        document.getElementById('list-phone').style.display = 'block';
    }

    // Spustiť načítanie
    loadMatches();
</script>
</body>
</html>
