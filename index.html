<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatoAnalitik - Jednoducho</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0a0518; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .tab { background: #222; padding: 10px 20px; border-radius: 5px; cursor: pointer; white-space: nowrap; }
        .tab.active { background: #00f2ff; color: black; font-weight: bold; }
        
        .league-group { margin-bottom: 20px; border: 1px solid #333; border-radius: 8px; overflow: hidden; }
        .league-header { background: #1a1a2e; padding: 10px; font-weight: bold; border-bottom: 1px solid #333; }
        
        .match { padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; cursor: pointer; }
        .match:last-child { border-bottom: none; }
        .match:active { background: #111; }
        .match .time { color: #888; font-size: 12px; }
        
        #detail { position: fixed; inset: 0; background: #0a0518; display: none; padding: 20px; z-index: 100; }
        .close-btn { color: #ff00ff; margin-bottom: 20px; cursor: pointer; }
        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <!-- Výber dňa -->
    <div class="tabs" id="day-tabs"></div>

    <!-- Zoznam líg a zápasov -->
    <div id="content"></div>

    <!-- Detail zápasu -->
    <div id="detail">
        <div class="close-btn" onclick="closeDetail()">← SPÄŤ</div>
        <h2 id="det-name"></h2>
        <div id="det-stats"></div>
        <p id="det-ai" style="background: #1a1a2e; padding: 15px; border-radius: 8px; margin-top: 20px;"></p>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBX-qBKbLfmBynXr4Bf1q5j4cXFyU9Dv0M",
        authDomain: "patoanalitik.firebaseapp.com",
        projectId: "patoanalitik",
        storageBucket: "patoanalitik.firebasestorage.app",
        messagingSenderId: "585647962898",
        appId: "1:585647962898:web:d050a3983c3e473e49d1cb"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentDay = new Date().toISOString().split('T')[0].replace(/-/g, '');

    function initDays() {
        const tabs = document.getElementById('day-tabs');
        for(let i=0; i<4; i++) {
            let d = new Date();
            d.setDate(d.getDate() + i);
            let dayId = d.toISOString().split('T')[0].replace(/-/g, '');
            let label = i === 0 ? "DNES" : d.toLocaleDateString('sk', {weekday:'short'}).toUpperCase();
            
            let btn = document.createElement('div');
            btn.className = `tab ${dayId === currentDay ? 'active' : ''}`;
            btn.innerText = label;
            btn.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                currentDay = dayId;
                loadMatches();
            };
            tabs.appendChild(btn);
        }
    }

    function loadMatches() {
        const content = document.getElementById('content');
        content.innerHTML = "Načítavam...";

        db.collection("zapasy").where("timestamp", "==", currentDay).get().then(snap => {
            content.innerHTML = "";
            if(snap.empty) { content.innerHTML = "Žiadne zápasy na tento deň."; return; }

            // Skupinové zobrazenie (LIGY)
            let leagues = {};
            snap.forEach(doc => {
                let m = doc.data();
                let lName = m.liga || "Ostatné ligy";
                if(!leagues[lName]) leagues[lName] = [];
                leagues[lName].push(m);
            });

            for(let liga in leagues) {
                let section = document.createElement('div');
                section.className = 'league-group';
                section.innerHTML = `<div class="league-header">${liga}</div>`;
                
                leagues[liga].forEach(m => {
                    let div = document.createElement('div');
                    div.className = 'match';
                    div.onclick = () => openDetail(m);
                    div.innerHTML = `
                        <div>${m.zapas}</div>
                        <div class="time">${m.cas}</div>
                    `;
                    section.appendChild(div);
                });
                content.appendChild(section);
            }
        });
    }

    function openDetail(m) {
        document.getElementById('det-name').innerText = m.zapas;
        document.getElementById('det-stats').innerHTML = `
            <div class="stat-row"><span>Over 1.5</span><b>${m.o15}%</b></div>
            <div class="stat-row"><span>Over 2.5</span><b>${m.o25}%</b></div>
            <div class="stat-row"><span>BTTS</span><b>${m.btts}%</b></div>
            <div class="stat-row"><span>Rohy</span><b>${m.rohy}</b></div>
            <div class="stat-row"><span>Karty</span><b>${m.karty}</b></div>
        `;
        document.getElementById('det-ai').innerText = m.ai;
        document.getElementById('detail').style.display = 'block';
    }

    function closeDetail() { document.getElementById('detail').style.display = 'none'; }

    initDays();
    loadMatches();
</script>
</body>
</html>
