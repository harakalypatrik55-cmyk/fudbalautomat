<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Tickets PRO</title>
    
    <!-- Meta tagy pre mobilnú apku -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-dark: #050505;
            --neon-purple: #bc13fe;
            --neon-cyan: #00f2ff;
            --neon-yellow: #fefe33;
            --neon-green: #00ff41;
            --neon-orange: #ff8c00;
            --text-gray: #888888;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* Hlavička */
        .app-header {
            text-align: center;
            padding: 50px 20px 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .section-title {
            padding: 10px 25px;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        /* Karty zápasov */
        .matches-list { padding: 0 20px 100px; }

        .match-card {
            background: rgba(15, 15, 20, 0.95);
            border-radius: 20px;
            margin-bottom: 20px;
            padding: 20px;
            border: 2px solid transparent;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: 0.2s;
        }
        .match-card:active { transform: scale(0.97); }

        /* Dynamické farby okrajov */
        .border-purple { border-color: var(--neon-purple); box-shadow: 0 0 15px rgba(188, 19, 254, 0.3); }
        .border-cyan { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }

        .league-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.08);
            padding: 5px 12px;
            border-radius: 8px;
            width: fit-content;
            margin-bottom: 15px;
        }
        .league-name { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #fff; }

        .teams-row {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            line-height: 1.2;
        }
        .teams-row span { color: var(--text-gray); font-weight: 300; margin: 0 8px; font-size: 18px; }

        /* Detail obrazovka */
        #detail-view {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            z-index: 1000;
            display: none;
            overflow-y: auto;
            padding: 60px 20px;
        }

        .back-btn { position: absolute; top: 45px; left: 25px; font-size: 28px; color: var(--neon-cyan); cursor: pointer; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            border: 2px solid #222;
            border-radius: 18px;
            padding: 20px;
            text-align: center;
        }
        .stat-box.highlight-yellow { border-color: var(--neon-yellow); }
        .stat-box.highlight-purple { border-color: var(--neon-purple); }
        .stat-box.highlight-cyan { border-color: var(--neon-cyan); }
        .stat-box.full { grid-column: 1 / -1; border-color: var(--neon-orange); }

        .st-label { font-size: 10px; color: var(--text-gray); text-transform: uppercase; margin-bottom: 5px; }
        .st-value { font-size: 26px; font-weight: 800; }

        .ai-card {
            margin-top: 20px;
            border: 1px solid var(--neon-green);
            background: rgba(0, 255, 65, 0.05);
            padding: 20px;
            border-radius: 20px;
        }
        .ai-card h3 { color: var(--neon-green); margin: 0 0 10px; font-size: 15px; text-transform: uppercase; }
        .ai-card p { font-size: 14px; color: #ccc; line-height: 1.6; font-style: italic; margin: 0; }

    </style>
</head>
<body>

    <!-- Hlavný zoznam -->
    <div id="home-view">
        <div class="app-header">Neural Tickets</div>
        <div class="section-title">Dnešné Tipy</div>
        <div class="matches-list" id="matches-container">
            <!-- Sem sa načítajú zápasy -->
        </div>
    </div>

    <!-- Detail zápasu -->
    <div id="detail-view">
        <div class="back-btn" onclick="closeDetail()">❮</div>
        <div class="app-header">Neural Tickets</div>
        <h2 id="match-title" style="text-align:center; margin: 30px 0; font-size:28px;"></h2>
        <div class="stats-grid" id="stats-container"></div>
        <div id="ai-container"></div>
    </div>

<script>
    // Konfigurácia tvojho Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBX-qBKbLfmBynXr4Bf1q5j4cXFyU9Dv0M",
        authDomain: "patoanalitik.firebaseapp.com",
        projectId: "patoanalitik",
        storageBucket: "patoanalitik.firebasestorage.app",
        messagingSenderId: "585647962898",
        appId: "1:585647962898:web:d050a3983c3e473e49d1cb"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const currentDay = "20260330"; 

    // Dynamické priradenie vlajky
    function getFlagIcon(liga) {
        if (!liga) return "⚽";
        const l = liga.toLowerCase();
        if (l.includes("premier")) return "🏴󠁧󠁢󠁥󠁮󠁧󠁿";
        if (l.includes("serie")) return "🇮🇹";
        if (l.includes("laliga")) return "🇪🇸";
        if (l.includes("bundesliga")) return "🇩🇪";
        if (l.includes("fortuna") || l.includes("slovak")) return "🇸🇰";
        return "⚽";
    }

    function loadData() {
        const container = document.getElementById('matches-container');
        db.collection("zapasy").where("timestamp", "==", currentDay).get().then(snap => {
            container.innerHTML = "";
            snap.forEach((doc, i) => {
                const m = doc.data();
                const neonClass = i % 2 === 0 ? 'border-purple' : 'border-cyan';
                
                const card = document.createElement('div');
                card.className = `match-card ${neonClass}`;
                card.onclick = () => openDetail(m);
                card.innerHTML = `
                    <div class="league-row">
                        <span>${getFlagIcon(m.liga)}</span>
                        <span class="league-name">${m.liga || 'LIGA'}</span>
                    </div>
                    <div class="teams-row">
                        ${m.zapas.replace(' vs ', ' <span>vs</span> ')}
                    </div>
                `;
                container.appendChild(card);
            });
        });
    }

    function openDetail(m) {
        document.getElementById('detail-view').style.display = 'block';
        document.getElementById('match-title').innerHTML = m.zapas.replace(' vs ', '<br><span style="color:#444; font-size:18px;">vs</span><br>');
        
        document.getElementById('stats-container').innerHTML = `
            <div class="stat-box highlight-yellow"><div class="st-label">Over 1.5</div><div class="st-value" style="color:var(--neon-yellow)">${m.o15}%</div></div>
            <div class="stat-box highlight-purple"><div class="st-label">Over 2.5</div><div class="st-value" style="color:var(--neon-purple)">${m.o25}%</div></div>
            <div class="stat-box highlight-purple"><div class="st-label">BTTS</div><div class="st-value" style="color:var(--neon-purple)">${m.btts > 50 ? 'YES' : 'NO'}</div></div>
            <div class="stat-box highlight-cyan"><div class="st-label">Corners</div><div class="st-value" style="color:var(--neon-cyan)">${m.rohy}</div></div>
            <div class="stat-box full"><div class="st-label">Cards</div><div class="st-value" style="color:var(--neon-orange)">${m.karty}</div></div>
        `;

        document.getElementById('ai-container').innerHTML = `
            <div class="ai-card">
                <h3>💡 AI Analysis</h3>
                <p>${m.ai || 'Načítavam analýzu...'}</p>
            </div>
        `;
    }

    function closeDetail() {
        document.getElementById('detail-view').style.display = 'none';
    }

    loadData();
</script>
</body>
</html>
