<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatoAnalitik PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #050510;
            --card-bg: #101020;
            --text: #ffffff;
            --neon-fuchsia: #ff00ff;
            --neon-cyan: #00f2ff;
            --neon-yellow: #ffff00;
            --neon-purple: #b000ff;
            --neon-green: #00ff88;
            --neon-orange: #ff8800;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Telefónny rám */
        .phone-frame {
            background: #000;
            width: 360px;
            height: 740px;
            border: 12px solid #222;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .phone-notch {
            background: #222;
            height: 25px;
            width: 150px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 20;
        }

        /* Obsahové obrazovky */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
            padding-top: 30px;
        }

        .screen.active { display: flex; }
        .screen::-webkit-scrollbar { display: none; }

        header, .detail-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        h1 { font-size: 20px; margin: 0; }
        h2 { font-size: 14px; color: #888; margin: 5px 0 0; }

        /* Zoznam zápasov */
        .matches-list { padding: 15px; }
        .match-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            border: 2px solid transparent;
        }
        .match-card:active { transform: scale(0.95); }
        .match-card.fuchsia { border-color: var(--neon-fuchsia); box-shadow: 0 0 10px rgba(255,0,255,0.3); }
        .match-card.cyan { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,242,255,0.3); }

        .league-badge {
            font-size: 10px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 10px;
        }
        .match-teams { font-size: 16px; font-weight: bold; text-align: center; }
        .match-teams span { color: #555; font-weight: normal; }

        /* Detail */
        .back-btn { position: absolute; left: 20px; top: 45px; font-size: 24px; cursor: pointer; color: var(--neon-cyan); z-index: 30; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border: 1px solid #333;
        }
        .stat-card.full { grid-column: 1 / -1; }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 22px; font-weight: bold; }

        /* Progress bary */
        .bar-bg { background: #222; height: 4px; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 1s ease-out; }

        .ai-box {
            margin: 0 20px 20px;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--neon-green);
            background: rgba(0, 255, 136, 0.05);
        }
        .ai-box h3 { color: var(--neon-green); margin-top: 0; font-size: 14px; }
        .ai-box p { font-size: 13px; color: #ccc; line-height: 1.5; margin: 0; font-style: italic; }

    </style>
</head>
<body>

<div class="phone-frame">
    <div class="phone-notch"></div>

    <!-- Obrazovka 1: Zoznam -->
    <div id="list-screen" class="screen active">
        <header>
            <h1>PatoAnalitik PRO ⚽</h1>
            <h2 id="current-date-label">Dnešné analýzy</h2>
        </header>
        <div class="matches-list" id="matches-container">
            <p style="text-align:center; color:#555; padding:20px;">Načítavam dáta...</p>
        </div>
    </div>

    <!-- Obrazovka 2: Detail -->
    <div id="detail-screen" class="screen">
        <div class="back-btn" onclick="showList()">←</div>
        <div class="detail-header">
            <h1 id="detail-teams-title">Zápas</h1>
        </div>
        <div id="detail-content">
            <!-- Dynamický obsah -->
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBX-qBKbLfmBynXr4Bf1q5j4cXFyU9Dv0M",
        authDomain: "patoanalitik.firebaseapp.com",
        projectId: "patoanalitik",
        storageBucket: "patoanalitik.firebasestorage.app",
        messagingSenderId: "585647962898",
        appId: "1:585647962898:web:d050a3983c3e473e49d1cb"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // Dátum vo formáte YYYYMMDD
    const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    const currentDay = "20260330"; // Pre testovacie účely podľa tvojho zadania

    function loadMatches() {
        const container = document.getElementById('matches-container');

        db.collection("zapasy")
          .where("timestamp", "==", currentDay)
          .get()
          .then(snap => {
            container.innerHTML = "";
            if(snap.empty) {
                container.innerHTML = "<p style='text-align:center; color:#666;'>Na dnes nie sú pripravené žiadne tipy.</p>";
                return;
            }

            snap.forEach((doc, index) => {
                const m = doc.data();
                const neonClass = index % 2 === 0 ? 'fuchsia' : 'cyan';
                const card = document.createElement('div');
                card.className = `match-card ${neonClass}`;
                card.onclick = () => showDetail(m);
                card.innerHTML = `
                    <div class="league-badge">${m.liga || 'Liga'}</div>
                    <div class="match-teams">${m.zapas.replace(' vs ', ' <span>vs</span> ')}</div>
                `;
                container.appendChild(card);
            });
          })
          .catch(err => {
            console.error(err);
            container.innerHTML = "<p style='text-align:center; color:red;'>Chyba pripojenia k databáze.</p>";
          });
    }

    function showDetail(m) {
        document.getElementById('list-screen').classList.remove('active');
        document.getElementById('detail-screen').classList.add('active');
        
        document.getElementById('detail-teams-title').innerHTML = m.zapas.replace(' vs ', '<br><span style="color:#555; font-size:14px;">vs</span><br>');

        const detailContent = document.getElementById('detail-content');
        detailContent.innerHTML = `
            <div class="stats-grid">
                ${createStatCard("Over 1.5", m.o15, "var(--neon-yellow)")}
                ${createStatCard("Over 2.5", m.o25, "var(--neon-purple)")}
                <div class="stat-card">
                    <div class="stat-label">BTTS</div>
                    <div class="stat-value" style="color: ${m.btts > 50 ? 'var(--neon-green)' : '#ff4444'}">
                        ${m.btts > 50 ? 'ÁNO' : 'NIE'}
                    </div>
                </div>
                ${createStatCard("Rohy", m.rohy, "var(--neon-cyan)", false)}
                <div class="stat-card full">
                    <div class="stat-label">Karty</div>
                    <div class="stat-value" style="color: var(--neon-orange)">${m.karty}</div>
                </div>
            </div>
            <div class="ai-box">
                <h3>AI Analýza</h3>
                <p>${m.ai || 'K tomuto zápasu zatiaľ nie je dostupný podrobný komentár.'}</p>
            </div>
        `;
    }

    function createStatCard(label, value, color, isPercent = true) {
        let barHtml = isPercent ? `
            <div class="bar-bg">
                <div class="bar-fill" style="width: ${value}%; background: ${color}; box-shadow: 0 0 8px ${color};"></div>
            </div>
        ` : '';

        return `
            <div class="stat-card">
                <div class="stat-label">${label}</div>
                <div class="stat-value" style="color: ${color}">${value}${isPercent ? '%' : ''}</div>
                ${barHtml}
            </div>
        `;
    }

    function showList() {
        document.getElementById('detail-screen').classList.remove('active');
        document.getElementById('list-screen').classList.add('active');
    }

    // Spustenie
    loadMatches();
</script>

</body>
</html>
